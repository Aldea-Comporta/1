.header-title{font-size:15px;font-weight:400;color:#ccc;letter-spacing:0.05em}
.legend{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}
.leg{font-size:10px;font-weight:500;padding:2px 9px;border-radius:20px;letter-spacing:0.03em}
.leg-gf{background:rgba(255,255,255,0.2);color:#fff}
.leg-eco{background:rgba(255,255,255,0.2);color:#fff}
.leg-store{background:rgba(255,255,255,0.2);color:#fff}
.search-wrap{background:#fff;padding:0.6rem 1rem;border-bottom:1px solid #e5e5e0}
.search-wrap input{width:100%;padding:8px 13px;border:1px solid #ddd;border-radius:10px;font-size:15px;background:#f9f9f7;color:#1a1a1a;outline:none}
.controls{background:#fff;padding:0.5rem 1rem;display:flex;flex-wrap:wrap;gap:6px;border-bottom:1px solid #e5e5e0}
.filter-btn{background:#fff;border:1px solid #ddd;border-radius:20px;padding:5px 12px;font-size:11px;cursor:pointer;color:#555;transition:all 0.15s;white-space:nowrap;letter-spacing:0.03em}
.filter-btn.active{background:#C4714A;color:#fff;border-color:#C4714A}
.count{font-size:11px;color:#999;padding:0.5rem 1rem 0;letter-spacing:0.03em}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;padding:0.75rem}
.card{background:#fff;border:1px solid #e8e8e4;border-radius:12px;overflow:hidden;display:flex;flex-direction:column}
.card-img-wrap{width:100%;height:120px;background:#f5f5f2;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:6px}
.card-img-wrap img{max-width:100%;max-height:100%;object-fit:contain}
.card-img-placeholder{width:100%;height:120px;background:#f0f0ec;display:flex;align-items:center;justify-content:center;font-size:30px}
.card-body{padding:0.65rem 0.75rem;flex:1;display:flex;flex-direction:column;gap:5px}
.brand-row{display:flex;align-items:center;gap:5px}
.brand-dot{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;flex-shrink:0;font-family:Georgia,serif}
.brand-name{font-size:10px;color:#aaa;font-weight:400;letter-spacing:0.04em;text-transform:uppercase}
.card-name{font-size:12px;font-weight:500;color:#1a1a1a;line-height:1.35;flex:1}
.card-desc{font-size:10px;color:#bbb;line-height:1.3}
.card-badges{display:flex;flex-wrap:wrap;gap:3px;margin-top:1px}
.tag{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500}
.tag-gf{background:#e6f4ec;color:#1a6640}
.tag-eco{background:#eaf3de;color:#3B6D11}
.tag-store{background:#e6f0fb;color:#1a4a80}
.buy-links{display:flex;flex-direction:column;gap:3px;margin-top:5px}
.buy-btn{display:block;text-align:center;font-size:10px;font-weight:500;padding:5px 6px;border-radius:7px;text-decoration:none;transition:opacity 0.15s;letter-spacing:0.02em}
.buy-btn:hover{opacity:0.75}
.b-cont{background:#fff3e0;color:#7d4700;border:1px solid #ffd180}
.b-cel{background:#e8f5e9;color:#1b5e20;border:1px solid #a5d6a7}
.b-nat{background:#e3f2fd;color:#0d47a1;border:1px solid #90caf9}
.b-cel2{background:#f5e8e8;color:#be1717;border:1px solid #d6a5a5}
.empty{padding:3rem;text-align:center;color:#aaa;font-size:13px;grid-column:1/-1}
.footer{background:#C4714A;padding:1rem 1.25rem;margin-top:2rem;text-align:center}
.footer a{color:rgba(255,255,255,0.75);font-size:11px;letter-spacing:0.1em;text-decoration:none;text-transform:uppercase}
@media(max-width:380px){
  .grid{grid-template-columns:repeat(2,1fr);gap:8px;padding:0.5rem}
}
</style>

const BC={
  schar:{bg:"#e8edf5",color:"#1a3060",label:"SC"},
  rudehealth:{bg:"#fde8e8",color:"#8b1a1a",label:"RH"},
  rummo:{bg:"#fff0e0",color:"#8b3a00",label:"RM"},
  ecocesta:{bg:"#e8f5e9",color:"#1a5e20",label:"EC"},
  naturefoods:{bg:"#fff8e1",color:"#7d4700",label:"NF"},
  provida:{bg:"#fff8e1",color:"#7d4700",label:"PR"},
  celeiro:{bg:"#ede9fe",color:"#4a148c",label:"VC"},
  continente:{bg:"#ede9fe",color:"#4a148c",label:"CB"},
};
const BN={schar:"Dr. Schär",rudehealth:"Rude Health",rummo:"Rummo",ecocesta:"Ecocesta",naturefoods:"Naturefoods",provida:"Provida",celeiro:"Vida Celeiro",continente:"Continente BIO"};

let aB="all",aC="all";

document.getElementById("brandCtrl").addEventListener("click",e=>{
  const b=e.target.closest(".filter-btn");if(!b)return;
  aB=b.dataset.brand;
  document.querySelectorAll("#brandCtrl .filter-btn").forEach(x=>x.classList.toggle("active",x===b));
  render();
});
document.getElementById("catCtrl").addEventListener("click",e=>{
  const b=e.target.closest(".filter-btn");if(!b)return;
  aC=b.dataset.cat;
  document.querySelectorAll("#catCtrl .filter-btn").forEach(x=>x.classList.toggle("active",x===b));
  render();
});

function render(){
  const q=document.getElementById("searchInput").value.toLowerCase();
  const f=DATA.filter(p=>
    (aB==="all"||p.brand===aB)&&
    (aC==="all"||p.cat===aC||p.isStore)&&
    (!q||p.name.toLowerCase().includes(q)||BN[p.brand].toLowerCase().includes(q)||p.desc.toLowerCase().includes(q))
  );
  document.getElementById("count").textContent=f.length+" product"+(f.length!==1?"s":"")+" found";
  const g=document.getElementById("grid");
  if(!f.length){g.innerHTML='<div class="empty">No products found</div>';return;}
  g.innerHTML=f.map(p=>{
    const bc=BC[p.brand];
    const tags=[];
    if(p.gf)tags.push('<span class="tag tag-gf">🌾 GF</span>');
    if(p.eco)tags.push('<span class="tag tag-eco">🍃 Organic</span>');
    if(p.isStore)tags.push('<span class="tag tag-store">🏪 Store</span>');
    const btns=p.links.map(l=>`<a href="${l.u}" target="_blank" class="buy-btn ${l.c}">${l.l}</a>`).join("");
    const imgHtml=`<div class="card-img-wrap"><img src="${p.img}" alt="${p.name}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\\'card-img-placeholder\\'>🛒</div>'"></div>`;
    return `<div class="card">
      ${imgHtml}
      <div class="card-body">
        <div class="brand-row">
          <div class="brand-dot" style="background:${bc.bg};color:${bc.color}">${bc.label}</div>
          <span class="brand-name">${BN[p.brand]}</span>
        </div>
        <div class="card-name">${p.name}</div>
        <div class="card-desc">${p.desc}</div>
        <div class="card-badges">${tags.join("")}</div>
        <div class="buy-links">${btns}</div>
      </div>
    </div>`;
  }).join("");
}
render();
